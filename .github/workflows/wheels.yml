name: Build & Publish Wheels

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build wheels (Linux / macOS / Windows) via cibuildwheel
  # ---------------------------------------------------------------------------
  build-wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-24.04, macos-14, windows-2022 ]

    steps:
      - uses: actions/checkout@v6


      - name: Set up QEMU (Linux aarch64 cross-compile)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2
        env:
          CIBW_BUILD_VERBOSITY: 1
          SIGNET_COMMERCIAL_LICENSE_KEY: ${{ secrets.SIGNET_FORGE_COMMERCIAL_LICENSE_KEY }}
          CIBW_ENVIRONMENT_PASS_LINUX: SIGNET_COMMERCIAL_LICENSE_KEY

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # Build source distribution
  # ---------------------------------------------------------------------------
  build-sdist:
    name: Source Distribution
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Publish to TestPyPI (tag push only, manual approval)
  # ---------------------------------------------------------------------------
  publish-testpypi:
    name: Publish → TestPyPI
    needs: [ build-wheels, build-sdist ]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
  # Publish to PyPI (tag push only, after TestPyPI, manual approval)
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish → PyPI
    needs: [ publish-testpypi ]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
